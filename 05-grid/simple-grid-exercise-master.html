<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CSS Grid Exercise</title>
    <style>
        .one {
            background-color: aqua;
        }
        .two {
            background-color: rgb(130, 255, 172);
        }
        .three {
            background-color: rgb(138, 207, 253);
        }
        .four {
            background-color: rgb(255, 208, 0);
        }
        .five {
            background-color: rgb(252, 108, 221);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(5, 5rem);
        }

        .one {
        grid-column: 5/12;
        grid-row: 1/3;
        }

        .two {
        grid-column: 5/8;
        grid-row: 3/4;
        }

        .three {
        grid-column: 12/13;
        grid-row: 1/6;
        }

        .four {
        grid-column: 8/12;
        grid-row: 3/6;
        }

        .five {
        grid-column: 5/8;
        grid-row: 4/6;
        }

    </style>

</head>
<body>

    <div class="grid">
        <div class="one">Div 1</div>
        <div class="two">Div 2</div>
        <div class="three">Div 3</div>
        <div class="four">Div 4</div>
        <div class="five">Div 5</div>
    </div>
    
</body>
</html>
